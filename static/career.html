<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职业选择问卷 — Life Choice Advisor</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">Life <span>Choice</span> Advisor</a>
      <nav>
        <a href="/gaokao">高考志愿</a>
        <a href="/career" class="active">职业选择</a>
        <a href="/history">历史报告</a>
        <span id="user-info" class="user-info"></span>
        <a href="#" id="nav-logout" onclick="logout(); return false;">登出</a>
      </nav>
    </header>

    <form id="career-form">
      <div class="card">
        <h2>教育背景</h2>
        <div class="grid-2">
          <div>
            <label>学历 *</label>
            <input name="education_level" required placeholder="本科">
          </div>
          <div>
            <label>毕业院校 *</label>
            <input name="university" required placeholder="华南理工大学">
          </div>
          <div>
            <label>专业 *</label>
            <input name="major" required placeholder="软件工程">
          </div>
          <div>
            <label>毕业年份</label>
            <input name="graduation_year" type="number" value="2026">
          </div>
          <div>
            <label>成绩水平</label>
            <input name="gpa_level" placeholder="良好">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>经历与技能</h2>
        <label>实习经历（每行一条）</label>
        <textarea name="internship_experience" placeholder="某互联网公司后端实习 3 个月"></textarea>
        <label>项目经历（每行一条）</label>
        <textarea name="project_experience"></textarea>
        <label>技能（逗号分隔）</label>
        <input name="skills" placeholder="Java, Python, MySQL">
      </div>

      <div class="card">
        <h2>测评与偏好</h2>
        <label>性格特点（逗号分隔）</label>
        <input name="personality_traits" placeholder="细致, 自驱力强">
        <label>MBTI</label>
        <input name="mbti" placeholder="ISTJ">
        <label>价值观（逗号分隔）</label>
        <input name="values" placeholder="技术成长, 稳定, 合理薪资">
        <label>心理素质测评摘要</label>
        <textarea name="psychological_assessment"></textarea>
        <label>职业能力测评得分（格式：分析力:88, 沟通力:62）</label>
        <input name="career_aptitude_scores" placeholder="分析力:88, 沟通力:62, 执行力:85">
        <label>意向城市（逗号分隔）</label>
        <input name="preferred_cities" placeholder="广州, 深圳">
        <label>薪资期望</label>
        <input name="salary_expectation" placeholder="应届 12-18K">
        <label>工作生活平衡期望</label>
        <input name="work_life_balance" placeholder="可接受适度加班">
        <label>不想进入的行业（逗号分隔）</label>
        <input name="excluded_industries">
        <label>其他补充</label>
        <textarea name="extra_notes"></textarea>
      </div>

      <div id="status" class="status-bar info hidden"></div>
      <button type="submit" class="btn btn-primary" id="submit-btn">提交分析（约 2-4 分钟）</button>
    </form>

    <div id="result" class="card hidden"></div>
  </div>
  <script src="/static/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error("auth");

    document.getElementById("career-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      btn.disabled = true;
      showStatus(status, "5 位专家 Agent 并行协作 + 辩论协调中，请耐心等待…", "info");
      result.classList.add("hidden");

      const fd = new FormData(e.target);
      const payload = {
        education_level: fd.get("education_level"),
        university: fd.get("university"),
        major: fd.get("major"),
        graduation_year: fd.get("graduation_year") ? parseInt(fd.get("graduation_year"), 10) : null,
        gpa_level: fd.get("gpa_level") || null,
        internship_experience: splitList(fd.get("internship_experience").replace(/\n/g, ",")),
        project_experience: splitList(fd.get("project_experience").replace(/\n/g, ",")),
        skills: splitList(fd.get("skills")),
        personality_traits: splitList(fd.get("personality_traits")),
        mbti: fd.get("mbti") || null,
        values: splitList(fd.get("values")),
        psychological_assessment: fd.get("psychological_assessment") || null,
        career_aptitude_scores: parseScores(fd.get("career_aptitude_scores")),
        preferred_cities: splitList(fd.get("preferred_cities")),
        salary_expectation: fd.get("salary_expectation") || null,
        work_life_balance: fd.get("work_life_balance") || null,
        excluded_industries: splitList(fd.get("excluded_industries")),
        extra_notes: fd.get("extra_notes") || null,
      };

      try {
        const data = await api("/api/career/advise", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        showStatus(status, "分析完成！报告已保存。", "success");
        result.classList.remove("hidden");
        renderReport(result, data);
      } catch (err) {
        showStatus(status, err.message, "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
