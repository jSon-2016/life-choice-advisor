<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职业选择问卷 — Life Choice Advisor</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">Life <span>Choice</span> Advisor</a>
      <nav>
        <a href="/gaokao">高考志愿</a>
        <a href="/career" class="active">职业选择</a>
        <a href="/history">历史报告</a>
        <span id="user-info" class="user-info"></span>
        <a href="#" id="nav-logout" onclick="logout(); return false;">登出</a>
      </nav>
    </header>

    <div class="card" id="import-card">
      <h2>导入心理/职业测评报告（推荐）</h2>
      <p class="hint">上传 PDF 或图片，自动 OCR + 语义重叠分块，无需重复填写测评与性格项。</p>
      <input type="file" id="report-file" accept=".pdf,image/png,image/jpeg,image/webp,image/bmp">
      <button type="button" class="btn btn-secondary" id="import-btn">解析报告</button>
      <div id="import-preview" class="hidden"></div>
    </div>

    <form id="career-form">
      <div class="card" id="edu-card">
        <h2>教育背景（报告未识别时需补充）</h2>
        <div class="grid-2">
          <div>
            <label>学历 *</label>
            <input name="education_level" required placeholder="本科" value="本科">
          </div>
          <div>
            <label>毕业院校 *</label>
            <input name="university" required placeholder="华南理工大学" value="华南理工大学">
          </div>
          <div>
            <label>专业 *</label>
            <input name="major" required placeholder="软件工程" value="软件工程">
          </div>
          <div>
            <label>毕业年份</label>
            <input name="graduation_year" type="number" value="2026">
          </div>
          <div>
            <label>成绩水平</label>
            <input name="gpa_level" placeholder="良好" value="良好">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>经历与技能</h2>
        <label>实习经历（每行一条）</label>
        <textarea name="internship_experience" placeholder="某互联网公司后端实习 3 个月">某互联网公司 Java 后端实习 3 个月</textarea>
        <label>项目经历（每行一条）</label>
        <textarea name="project_experience">校园二手交易平台
RAG 问答小项目</textarea>
        <label>技能（逗号分隔）</label>
        <input name="skills" placeholder="Java, Python, MySQL" value="Java, Python, MySQL, Spring Boot">
      </div>

      <div class="card" id="assessment-card">
        <h2>测评与偏好（可导入报告后跳过）</h2>
        <label>性格特点（逗号分隔）</label>
        <input name="personality_traits" placeholder="细致, 自驱力强" value="细致, 偏内向, 自驱力强">
        <label>MBTI</label>
        <input name="mbti" placeholder="ISTJ" value="ISTJ">
        <label>价值观（逗号分隔）</label>
        <input name="values" placeholder="技术成长, 稳定, 合理薪资" value="技术成长, 工作稳定, 合理薪资">
        <label>心理素质测评摘要</label>
        <textarea name="psychological_assessment">情绪较稳定，面对不确定性时会焦虑，偏好有明确目标的任务</textarea>
        <label>职业能力测评得分（格式：分析力:88, 沟通力:62）</label>
        <input name="career_aptitude_scores" placeholder="分析力:88, 沟通力:62, 执行力:85" value="分析力:88, 沟通力:62, 执行力:85, 创造力:70, 领导力:55">
        <label>意向城市（逗号分隔）</label>
        <input name="preferred_cities" placeholder="广州, 深圳" value="广州, 深圳">
        <label>薪资期望</label>
        <input name="salary_expectation" placeholder="应届 12-18K" value="应届 12-18K">
        <label>工作生活平衡期望</label>
        <input name="work_life_balance" placeholder="可接受适度加班" value="可接受适度加班，不希望 996">
        <label>不想进入的行业（逗号分隔）</label>
        <input name="excluded_industries" value="传统销售, 纯体力岗位">
        <label>其他补充</label>
        <textarea name="extra_notes"></textarea>
      </div>

      <div id="progress-panel" class="progress-panel hidden">
        <h3>分析进度</h3>
        <ul id="progress-steps" class="progress-steps"></ul>
      </div>
      <div id="status" class="status-bar info hidden"></div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">提交分析（约 2-4 分钟）</button>
        <button type="button" class="btn btn-secondary hidden" id="cancel-btn">停止分析</button>
      </div>
    </form>

    <div id="result" class="card hidden"></div>
  </div>
  <script src="/static/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error("auth");

    let importedReportContext = null;

    bindReportImport({
      fileInputId: "report-file",
      buttonId: "import-btn",
      previewId: "import-preview",
      advisoryType: "career",
      hideSelectors: ["#assessment-card"],
      onParsed(data) {
        importedReportContext = data.report_context;
        const p = data.career_profile || data.careerProfile;
        if (!p) return;
        const form = document.getElementById("career-form");
        setInputValue(form, "education_level", p.education_level);
        setInputValue(form, "university", p.university);
        setInputValue(form, "major", p.major);
        setInputValue(form, "graduation_year", p.graduation_year);
        setInputValue(form, "skills", p.skills);
        setInputValue(form, "personality_traits", p.personality_traits);
        setInputValue(form, "mbti", p.mbti);
        setInputValue(form, "values", p.values);
        setInputValue(form, "psychological_assessment", p.psychological_assessment);
        if (p.career_aptitude_scores) {
          const scores = Object.entries(p.career_aptitude_scores)
            .map(([k, v]) => `${k}:${v}`)
            .join(", ");
          setInputValue(form, "career_aptitude_scores", scores);
        }
        setInputValue(form, "preferred_cities", p.preferred_cities);
        setInputValue(form, "extra_notes", p.extra_notes);
      },
    });

    bindAdvisoryForm({
      formId: "career-form",
      endpoint: "/api/career/advise",
      getImportContext: () => importedReportContext,
      runningMessage: "5 位专家 Agent 并行协作 + 辩论协调中，可随时点击「停止分析」取消…",
      buildPayload(fd) {
        return {
          education_level: fd.get("education_level"),
          university: fd.get("university"),
          major: fd.get("major"),
          graduation_year: fd.get("graduation_year") ? parseInt(fd.get("graduation_year"), 10) : null,
          gpa_level: fd.get("gpa_level") || null,
          internship_experience: splitList(fd.get("internship_experience").replace(/\n/g, ",")),
          project_experience: splitList(fd.get("project_experience").replace(/\n/g, ",")),
          skills: splitList(fd.get("skills")),
          personality_traits: splitList(fd.get("personality_traits")),
          mbti: fd.get("mbti") || null,
          values: splitList(fd.get("values")),
          psychological_assessment: fd.get("psychological_assessment") || null,
          career_aptitude_scores: parseScores(fd.get("career_aptitude_scores")),
          preferred_cities: splitList(fd.get("preferred_cities")),
          salary_expectation: fd.get("salary_expectation") || null,
          work_life_balance: fd.get("work_life_balance") || null,
          excluded_industries: splitList(fd.get("excluded_industries")),
          extra_notes: fd.get("extra_notes") || null,
        };
      },
    });
  </script>
</body>
</html>
